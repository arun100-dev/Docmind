version: '3.8'

services:
  valkey:
    image: valkey/valkey:7-alpine
    container_name: docmind-redis
    ports:
      - '6379:6379'
    volumes:
      - valkey_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: docmind-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  valkey_data:
  qdrant_data:
